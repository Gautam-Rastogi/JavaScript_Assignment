<!DOCTYPE html>
<html>

<head>
    <link href="./output.css" rel="stylesheet">
</head>

<body class="bg-gray-100 flex h-screen">

    <div class="w-96 my-5 mx-auto border border-2 rounded-xl py-5 px-12 bg-white">
        <p class="font-medium text-gray-500 ">Sex</p>
        <div class="flex gap-2 mt-2">
            <input type="radio" name="gender">
            <p>Female</p>
        </div>
        <div class="flex gap-2 mt-2">
            <input type="radio" name="gender">
            <p>Male</p>
        </div>
        <div class="mt-6">
            <label for="" class="text-neutral-600 font-semibold">Height (in inches)</label>
            <input type="text" id="height" class="w-full my-2 bg-gray-100 py-2 px-3 border border-gray-300 rounded-md hover:border-violet-500 focus:outline-none focus:border-violet-700 focus:ring-2">
        </div>
        <div class="mt-3">
            <label for="" class="text-neutral-600 font-semibold">Weight (in Kilograms)</label>
            <input type="text" id="weight" class="w-full my-2 bg-gray-100 py-2 px-3 border border-gray-300 rounded-md hover:border-violet-500 focus:outline-none focus:border-violet-700 focus:ring-2">
        </div>
        <div class="mt-3">
            <button type="submit" onclick="calculateBMI()" class="w-full bg-black text-white py-2 rounded-lg">Submit</button>
        </div>
        <div class="mt-4">
            <label for="" class="text-neutral-600 font-semibold">BMI</label>
            <input type="text" id="bmi" class="w-full my-2 bg-gray-100 py-2 px-3 border border-gray-300 rounded-md hover:border-violet-500 focus:outline-none focus:border-violet-700 focus:ring-2">
        </div>
        <div class="result">
            <p id="result"></p>
        </div>
        

    </div>

    <script src="app.js"></script>
</body>

</html>
